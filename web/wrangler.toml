name = "clinic-solutions-config"
main = "worker.js"
compatibility_date = "2024-09-23"

# Route: serve at jaryai.com/fbhk/clinic-solutions-config*
# Requires jaryai.com to be a Cloudflare-managed zone in your account.
[[routes]]
pattern = "jaryai.com/fbhk/clinic-solutions-config*"
zone_name = "jaryai.com"

# Static assets — the Vite dist/ folder is uploaded to Cloudflare's CDN.
# The ASSETS binding makes env.ASSETS available in worker.js.
[assets]
directory = "./dist"
binding = "ASSETS"
